experiments:
  # Type 1: Baseline (Non-distributed)
  - experiment_number: 1
    experiment_name: "baseline_no_ckpt"
    distributed: false
    checkpoint_frequency: null
    use_torch_distributed_ckpt: false
    log_loss_to_csv: true
    timeaware_checkpointing: false
    training_steps: 5000
    time: "02:00:00"
    output: "/iopsstor/scratch/cscs/%u/baseline_no_ckpt_%j.out"
    error: "/iopsstor/scratch/cscs/%u/baseline_no_ckpt_%j.err"
    out: "/iopsstor/scratch/cscs/%u/baseline_no_ckpt_%j.out"
    err: "/iopsstor/scratch/cscs/%u/baseline_no_ckpt_%j.err"
    num_nodes: 1
    num_tasks_per_node: 1
    num_gpus_per_node: 1

